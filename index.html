<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnalystReport - 分析报告中心</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">📊 AnalystReport</h1>
            <p class="site-subtitle">多维度数据分析报告中心</p>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h2>探索数据背后的洞察</h2>
            <p>汇集多领域分析报告，以清晰的可视化呈现，帮助你快速理解复杂信息。</p>
        </div>
    </section>

    <!-- Reports Section -->
    <main class="container">
        <section class="reports-section">
            <div class="section-header">
                <h2>📋 报告列表</h2>
                <span class="report-count" id="reportCount">0 份报告</span>
            </div>
            <div class="reports-grid" id="reportsGrid">
                <!-- 由 JS 动态加载 -->
                <div class="loading">加载中...</div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>© 2026 AnalystReport · Powered by <a href="https://github.com/GL-Universe/AnalystReport" target="_blank">GitHub Pages</a></p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
